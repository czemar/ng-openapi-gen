name: build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Build
      run: go build -o ng-openapi-gen ./cmd/ng-openapi-gen
    - name: Test
      run: go test ./...
    - name: Vet
      run: go vet ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Build binaries
      run: |
        go build -o ng-openapi-gen-${{ runner.os }}-${{ runner.arch }} ./cmd/ng-openapi-gen
    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: ng-openapi-gen-${{ runner.os }}-${{ runner.arch }}
        path: ng-openapi-gen-${{ runner.os }}-${{ runner.arch }}
    - name: Release
      uses: softprops/action-gh-release@v2
      if: ${{ runner.os == 'Linux' }}
      with:
        files: ng-openapi-gen-*-*
        generate_release_notes: true

  publish-go:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Check Go module proxy readiness
      run: GOPROXY=proxy.golang.org,direct go list -m github.com/czemar/ng-openapi-gen@${{ github.ref_name }}
